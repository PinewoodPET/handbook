name: Update DevForum Post

on:
  push:
    branches:
      - main
    paths:
      - Handbook.md

jobs:
  check-length:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Update DevForum Post
        env:
          DEVFORUM_API_KEY: ${{ secrets.DEVFORUM_API_KEY }}
          DEVFORUM_POST_ID: ${{ vars.DEVFORUM_POST_ID }}
        run: node .github/scripts/update-devforum.js