name: Check Handbook Length

on:
  push:
    paths:
      - Handbook.md
  pull_request:
    paths:
      - Handbook.md

jobs:
  check-length:
    runs-on: ubuntu-slim
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Check Handbook.md character count
        id: check
        run: |
          CHARS=$(wc -c < Handbook.md)
          echo "chars=$CHARS" >> $GITHUB_OUTPUT
          echo "Handbook.md is $CHARS characters"
          if [ "$CHARS" -gt 50000 ]; then
            echo "over=true" >> $GITHUB_OUTPUT
          else
            echo "over=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR if over limit
        if: steps.check.outputs.over == 'true' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const chars = ${{ steps.check.outputs.chars }};
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `*Handbook.md is **${chars.toLocaleString()} characters**, which exceeds the 50,000 character DevForum post limit.`
            });

      - name: Fail if over limit
        if: steps.check.outputs.over == 'true'
        run: |
          echo "Handbook.md exceeds 50,000 characters (${{ steps.check.outputs.chars }})."
          exit 1

      - name: Pass
        if: steps.check.outputs.over == 'false'
        run: echo "Within limit (${{ steps.check.outputs.chars }} / 50000)"
